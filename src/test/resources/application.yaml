spring:
  h2.console:
    enabled: false
    path: /console/
    settings:
      trace: false
      web-allow-others: false
  datasource:
    url: jdbc:h2:${user.dir}/thb-test
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate.ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

buttons.in.row: 3

default.language: en
#internationalization.enabled: ${INTERNATIONALIZATION_ENABLED:false}

bcrypt.rounds: 11
default:
  admin:
    login: admin
    password: $2y$11$LH5u77OHqFSc6p2nmR9VM.E3FgeCM6QeAVii1GsEENEhOEjCpYdPu
  user:
    login: user
    password: $2y$11$LH5u77OHqFSc6p2nmR9VM.E3FgeCM6QeAVii1GsEENEhOEjCpYdPu

login:
  max.attempts.before.block: 5
  blocking.time.in.minutes: 600

hosts.default:
  page.size: 20
  sorting: state
  sorting.direction: asc

wakeOnLan:
  port: 9
  broadcast.ip: 192.168.31.255

integrations:
  telegram:
    enabled: false
  openweather:
    enabled: false
