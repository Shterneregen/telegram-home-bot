server:
  port: ${SERVER_PORT:9988}
  #============================================================
  # SSL config
  #============================================================
  ssl:
    enabled: false
    key-store: classpath:thb-keystore.p12
    key-store-password: SOME_SECURE_PSW
    key-store-type: PKCS12
    key-alias: thb

#============================================================
logging.level:
  random.telegramhomebot: info
  org.telegram: info

management:
  endpoints.web.exposure.include: '*'
  endpoint.health.show-details: when_authorized

spring:
  servlet:
    multipart:
      # Max file size
      max-file-size: 1MB
      # Max Request Size
      max-request-size: 1MB
  #============================================================
  # H2/DB config
  #============================================================
  h2.console:
    enabled: false
    path: /console/
    settings:
      trace: false
      web-allow-others: false
  datasource:
    url: ${DB_URL:jdbc:h2:${user.dir}/thb}
    driverClassName: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate.ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

buttons.in.row: 3

#============================================================
# Network Monitor config
#============================================================
network-monitor:
  enabled: ${NETWORK_MONITOR_ENABLED:false}
  state-change:
    command: ip -j n show
    scheduled.time: 600000
  ping-stored-hosts.scheduled-time: 600000
  broadcast.ping:
    scheduled-time: 120000
    command:
      linux: ${BROADCAST_PING_COMMAND_LINUX:fping -A -d -a -q -g -a -i 1 -r 2 192.168.0.0/24 ; arp -a}
      windows: ${BROADCAST_PING_COMMAND_WINDOWS:cmd.exe /c FOR /L %i in (1,1,255) do @ping -n 1 -w 100 192.168.1.%i | find "Reply" && arp -a}

#============================================================
# Lang config
#============================================================
# en,ru
default.language: ${DEFAULT_LANGUAGE:en}
internationalization.enabled: ${INTERNATIONALIZATION_ENABLED:false}

#============================================================
# Security config
#============================================================
bcrypt.rounds: 11
default:
  admin:
    login: admin
    # BCrypt string with bcrypt.rounds
    password: $2y$11$LH5u77OHqFSc6p2nmR9VM.E3FgeCM6QeAVii1GsEENEhOEjCpYdPu
  user:
    login: user
    # BCrypt string with bcrypt.rounds
    password: $2y$11$LH5u77OHqFSc6p2nmR9VM.E3FgeCM6QeAVii1GsEENEhOEjCpYdPu
login:
  max.attempts.before.block: 5
  blocking.time.in.minutes: 600

#============================================================
# Hosts page config
#============================================================
hosts.default:
  page.size: 20
  sorting: state
  sorting.direction: asc

#============================================================
# Wake On Lan config
#============================================================
wakeOnLan:
  port: 9
  broadcast.ip: 192.168.31.255

integrations:
  #============================================================
  # Telegram-bot config
  #============================================================
  telegram:
    enabled: ${TELEGRAM_ENABLED:false}
    token: ${TELEGRAM_TOKEN}
    chat-id: ${TELEGRAM_BOT_CHAT_ID}
    # comma separated list
    home-group-user-ids: ${TELEGRAM_HOME_GROUP_USER_IDS:}
  #============================================================
  # Open Weather config
  #============================================================
  openweather:
    enabled: ${OPENWEATHER_ENABLED:false}
    base-url: https://api.openweathermap.org/data/2.5
    appid: ${OPENWEATHER_APPID}
